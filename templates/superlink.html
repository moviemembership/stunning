{% extends "base.html" %}
{% block content %}

<div class="tg-wrapper">

  <div class="tg-card">

    <h1>Join Our Telegram</h1>

    <p class="tg-sub">
      Get latest codes, updates and support in our Telegram group.
    </p>

    <div class="qr-box">
      <img src="/test/telegram-qr.jpg" alt="Telegram QR Code">
    </div>

    <div class="link-box">
      <input id="telegramLink"
             type="text"
             value="https://t.me/movie_membership"
             readonly>

      <button onclick="copyTelegramLink()">
        Copy
      </button>
    </div>

    <p id="copyMsg" class="copy-msg"></p>

        <a class="tg-main-btn"
       href="https://t.me/movie_membership"
       target="_blank"
       rel="noopener noreferrer">
      Open Telegram Now
    </a>

  </div>

</div>

<style>
.tg-wrapper{
  max-width:560px;
  margin:45px auto;
  padding:20px;
}

.tg-card{
  background:#0e162e;
  border:1px solid #1f2b4a;
  border-radius:24px;
  padding:34px;
  text-align:center;
  box-shadow:0 12px 35px rgba(0,0,0,.35);
}

.tg-card h1{
  color:#22d3ee;
  font-size:36px;
  margin-bottom:10px;
}

.tg-sub{
  color:#9ca3af;
  line-height:1.6;
  margin-bottom:24px;
}

.tg-main-btn{
  display:block;
  width:100%;
  box-sizing:border-box;
  background:#22d3ee;
  color:#001017;
  padding:15px;
  border-radius:14px;
  font-weight:900;
  text-decoration:none;
  margin-bottom:26px;
}

.qr-box{
  background:#111827;
  border:1px solid #243150;
  border-radius:20px;
  padding:18px;
  margin-bottom:22px;
}

.qr-box img{
  width:100%;
  max-width:320px;
  border-radius:16px;
}

.link-box{
  display:flex;
  gap:10px;
}

.link-box input{
  flex:1;
  padding:14px;
  border-radius:12px;
  border:1px solid #243150;
  background:#111827;
  color:white;
  font-size:15px;
}

.link-box button{
  border:none;
  border-radius:12px;
  background:#EE4D2D;
  color:white;
  font-weight:900;
  padding:0 20px;
  cursor:pointer;
}

.copy-msg{
  color:#22c55e;
  font-weight:800;
  margin-top:14px;
}

@media(max-width:600px){
  .tg-card{
    padding:24px;
  }

  .link-box{
    flex-direction:column;
  }

  .link-box button{
    padding:14px;
  }
}
</style>

<script>
function copyTelegramLink(){
  const input = document.getElementById("telegramLink");
  const msg = document.getElementById("copyMsg");

  navigator.clipboard.writeText(input.value).then(function(){
    msg.innerText = "Telegram link copied!";
  }).catch(function(){
    input.select();
    document.execCommand("copy");
    msg.innerText = "Telegram link copied!";
  });
}
</script>

{% endblock %}
